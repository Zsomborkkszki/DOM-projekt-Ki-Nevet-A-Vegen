<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Ki nevet a végén?</title>
</head>
<body>
    <section>
        <div>
            <h1>Ki nevet a végén?</h1>
        </div>
        <div class="game-container">
            <div class="player" id="player1">
                <h2>Játékos 1</h2>
                <div class="box" id="gameBox"></div>
                <p id="score1">Pontszám: 0</p>
                <p id="reactionTime"></p>
                <button id="startBtn" onclick="startGame()">Indítás</button>
            </div>
        </div>

        <div class="toplista">
            <h2>Toplista</h2>
            <table>
                <thead>
                    <tr><th>#</th><th>Idő (ms)</th></tr>
                </thead>
                <tbody id="toplistBody">
                    <tr><td colspan="2">Még nincs eredmény</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</body>
</html>
